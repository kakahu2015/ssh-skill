name: Shell CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n scripts/*.sh
      - name: Validate example inventory
        run: bash scripts/validate_hosts.sh hosts.example.yaml
      - name: Validate generic agent gate dry-run
        run: bash scripts/agent_gate.sh --decision examples/decision-record.observe.json --policy autonomy.example.yaml --dry-run
      - name: ShellCheck advisory
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
